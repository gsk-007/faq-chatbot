<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>AI Live Chat Agent</title>

    <link
        rel="stylesheet"
        href="/css/styles.css"
    />

    <script
        defer
        src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    ></script>

    <script
        defer
        type="module"
        src="/js/app.js"
    ></script>
</head>

<body>

<div class="app">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <h2>Chats</h2>

            <button id="new-chat-btn">
                +
            </button>

        </div>

        <div
            id="conversation-list"
            class="conversation-list"
        >
        </div>

    </aside>

    <!-- Main -->

    <main class="chat">

        <!-- Header -->

        <header class="chat-header">

            <h2 id="chat-title">
                New Chat
            </h2>

        </header>

        <!-- Messages -->

        <section
            id="messages"
            class="messages"
        >

            <div class="empty-state">

                <h2>
                    👋 Welcome
                </h2>

                <p>
                    Ask me anything about our fictional store.
                </p>

            </div>

        </section>

        <!-- Typing -->

        <div
            id="typing-indicator"
            class="typing hidden"
        >
            AI is typing...
        </div>

        <!-- Input -->

        <footer class="chat-input">

            <textarea
                id="message-input"
                rows="1"
                placeholder="Type your message..."
            ></textarea>

            <button id="send-btn">

                Send

            </button>

        </footer>

    </main>

</div>

</body>
</html>
