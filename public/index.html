<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel &amp; Pine — Support</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer type="module" src="/js/faqs.js"></script>
    <script defer type="module" src="/js/app.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Header -->
<header class="site-header">
    <div class="container">
        <div class="logo">Pixel &amp; Pine</div>
    </div>
</header>

<!-- FAQ -->
<main id="faq" class="faq-section">
    <div class="container">

        <h2 class="section-title">Frequently Asked Questions</h2>

        <div class="faq-grid" id="faq-grid"></div>
    </div>
</main>

<!-- Footer -->
<footer class="site-footer">
    <div class="container">
        <p>&copy; 2025 Pixel &amp; Pine. All rights reserved.</p>
    </div>
</footer>

<!-- Chat Widget -->
<div id="chat-widget">

    <button id="chat-toggle" class="chat-toggle" aria-label="Open chat support">
        <svg class="icon-chat" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <svg class="icon-close hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        <span>Chat with us</span>
    </button>

    <div id="chat-panel" class="chat-panel" aria-hidden="true">

        <div class="chat-panel-header">
            <div class="agent-info">
                <div class="agent-avatar">P</div>
                <div>
                    <div class="agent-name">Pine Support</div>
                    <div class="agent-status">
                        <span class="status-dot"></span>
                        AI agent · Always on
                    </div>
                </div>
            </div>
            <button id="chat-new" class="icon-btn" title="New conversation">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>

        <div id="sessions-bar" class="sessions-bar"></div>

        <div id="messages" class="messages"></div>

        <div class="chat-input">
            <textarea
                id="message-input"
                rows="1"
                placeholder="Ask anything..."
                aria-label="Message input"
            ></textarea>
            <button id="send-btn" aria-label="Send message">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

</div>

</body>
</html>
